<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Password Generator</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }

    .card {
      border-radius: 12px;
    }

    #password {
      font-weight: bold;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card p-4 shadow" style="width: 400px;">

    <h4 class="text-center mb-3">🔐 Password Generator</h4>

    <!-- Password Output -->
    <div class="input-group mb-3">
      <input type="text" id="password" class="form-control" readonly>
      <button class="btn btn-outline-secondary" onclick="copyPassword()">Copy</button>
    </div>

    <!-- Length -->
    <label>Password Length: <span id="lengthValue">8</span></label>
    <input type="range" min="4" max="20" value="8" class="form-range" id="length">

    <!-- Options -->
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="uppercase" checked>
      <label class="form-check-label">Uppercase</label>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="lowercase" checked>
      <label class="form-check-label">Lowercase</label>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="numbers" checked>
      <label class="form-check-label">Numbers</label>
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="symbols">
      <label class="form-check-label">Symbols</label>
    </div>

    <!-- Generate Button -->
    <button class="btn btn-primary w-100" onclick="generatePassword()">
      Generate Password
    </button>

  </div>

</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
