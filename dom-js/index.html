<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Cards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f5f5;
      font-family: 'Segoe UI', sans-serif;
    }

    .card-custom {
      border: none;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .card-img-top {
      height: 250px;
      object-fit: cover;
    }

    .card-body {
      background: #55b04a;
      color: white;
    }

    .badge-custom {
      font-size: 19px;
      padding: 7px 12px;
      border-radius: 5px;
    }

    .price {
      font-size: 22px;
      font-weight: bold;
    }

    .old-price {
      text-decoration: line-through;
      color: #dcdcdc;
      margin-left: 10px;
    }

    .color-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      cursor: pointer;
      border: 2px solid white;
    }

    .btn-cart {
      margin-top: 15px;
      border-radius: 6px;
      padding: 10px 15px;
      font-weight: 500;
    }

    
  </style>
</head>
<body>

<div class="container py-5 ">
  <div class="row g-4">

   
    <div class="col-md-6">
      <div class="card card-custom">
        <img src="assets/redCar.jpg" class="card-img-top" id="car-image" alt="car">

        <div class="card-body">
          <span class="badge  badge-custom"id="badge"style="background-color: red; color: white;">CAR</span>

          <h4 class="mt-3">Mercedez Benz c300 2022</h4>

          <p class="mb-1"><i class="fa-solid fa-car" style="color: rgb(2, 3, 4);"></i> &nbsp Mileage: 4,000 miles</p>
          <p class="mb-1"><i class="fa-solid fa-gas-pump" style="color: rgb(2, 3, 4);"></i> &nbsp Fuel: 25mpg</p>
          <p class="mb-2"><i class="fa-solid fa-shield-alt" style="color: rgb(2, 3, 4);"></i> &nbsp Safety: ⭐⭐⭐⭐⭐</p>

          <p class="mb-1">Pick a color:</p>
          <div class="mb-2">
            <span class="color-dot" style="background:white;" onclick="white()"></span>
            <span class="color-dot" style="background:gray;" onclick="gray()"></span>
            <span class="color-dot" style="background:rgb(4, 4, 104);" onclick="blue()"></span>
            
          </div>

          <div class="d-flex align-items-center">
            <span class="price">$134,450</span>
            <span class="old-price">$140,500</span>
          </div>

          <button class="btn  btn-cart mt-3" id="add-to-cart" style="background-color: red;">
        <i class="fa-solid fa-cart-shopping" style="color: rgb(2, 3, 4);" id="cart"></i> Add to Cart
          </button>
        </div>
      </div>
    </div>

    
          </button>
        </div>
      </div>
   
<script src="script.js"></script>
</body>
</html>
