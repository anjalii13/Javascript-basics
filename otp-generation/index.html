<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OTP Verification</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      /* margin: 150px 200px; */
      margin: 0;
      height: 100vh;
      /* width: 70%; */
      display: flex;
    }

    .left-panel {
      width: 40%;
      background: linear-gradient(135deg, #4e73df, #2e59d9);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .left-content {
      text-align: left;
      padding: 20px;
    }

    .left-content h2 {
      font-weight: bold;
      border-left: 5px solid white; 
      padding: 10px ;
    }

    .right-panel {
      width: 60%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f8f9fc;
    }

    .otp-card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }

    .otp-input {
      width: 45px;
      height: 45px;
      text-align: center;
      font-size: 18px;
      margin: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .otp-input:focus {
      border-color: #4e73df;
      outline: none;
      box-shadow: 0 0 5px rgba(78,115,223,0.5);
    }

    .verify-btn {
      width: 100%;
      background: #4e73df;
      border: none;
      margin-top: 15px;
    }

    .verify-btn:hover {
      background: #2e59d9;
    }
  </style>
</head>

<body>

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="left-content">
      <h2>OTP <br>
      Verification <br>
    JavaScript</h2>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="otp-card">

      <div class="mb-3">
        <div style="font-size: 30px;">🔒</div>
        <p class="mt-2">Enter OTP Code</p>
      </div>

      <!-- OTP Inputs -->
      <div>
        <input type="text" maxlength="1" class="otp-input" id="otp1" oninput="moveToNext('otp2')">
        <input type="text" maxlength="1" class="otp-input" id="otp2" oninput="moveToNext('otp3')">
        <input type="text" maxlength="1" class="otp-input" id="otp3" oninput="moveToNext('otp4')">
        <input type="text" maxlength="1" class="otp-input" id="otp4">
      </div>

      <button class="btn verify-btn text-white" onclick="verifyOTP()" id="btnV">Verify OTP</button>

    </div>
  </div>
<div class="container position-absolute bottom-0 start-50 translate-middle-x mb-3">
    <button onclick="generateOTP()">Generate Otp</button>
</div>
  <script src="script.js"></script>

</body>
</html>
